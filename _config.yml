about_content: |
  문제가 생기면 끝까지 파고드는 개발자 이우진입니다.
  저는 Spring Boot · MyBatis · MySQL 환경에서 실제 서비스를 개발해왔으며,
  기능 구현보다 시스템이 왜 문제를 일으키는지를 먼저 묻는 개발자입니다.

  크림하우스에서 LG 트윈스 팬 서비스 플랫폼 백엔드를 담당하며,
  연간 회원 중복 결제 버그를 WebView 이중 호출 구조에서 직접 찾아냈고,
  외부 티켓팅 API 연동 시 응답 지연 · 실패 · 중복 요청 케이스를 전부 정의해 처리했습니다.
  SQL Injection · CSRF 등 보안 취약점도 직접 점검하고 개선했습니다.

  프로젝트에서는 Jenkins · Docker · Kubernetes 자동화 배포 파이프라인을 직접 구축했고,
  운영 중 발생한 DB 접속 실패와 PVC 마운트 오류를 직접 원인 분석해 해결했습니다.
  장애를 회피하지 않고 끝까지 파고드는 과정에서,
  기능을 넘어 시스템 전체를 안정적으로 운영하는 역량을 키웠습니다.

  앞으로는 복잡한 트랜잭션과 대규모 트래픽 환경에서도
  흔들리지 않는 백엔드를 설계하고 운영하는 개발자로 성장하겠습니다.

