about_content: |
  기능보다 흐름을, 로직보다 맥락을 먼저 보는 개발자 이우진입니다.

  크림하우스에서 LG 트윈스 팬 서비스의 회원권 결제 · 경기장 직관 인증 · 사용자 알림함 · 푸시 알림 백엔드를 담당했습니다.
  직관 인증은 티켓링크 API와 연동해 입장 티켓 유효성을 검증하는 구조였으며, 응답 지연 · 실패 · 중복 요청 케이스를 전부 정의해 처리했습니다.
  연간 회원 중복 결제 버그는 WebView 이중 호출 구조에서 문제점을 파악해 수정했고, SQL Injection · CSRF 등 보안 취약점도 직접 점검하고 개선했습니다.

  앞으로는 복잡한 트랜잭션과 대규모 트래픽 환경에서도 흔들리지 않는 백엔드를 설계하고 운영하는 개발자로 성장하겠습니다.

